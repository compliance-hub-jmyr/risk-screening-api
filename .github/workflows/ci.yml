name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: "10.0.x"

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Build
        run: dotnet build RiskScreening.sln -c Release

      - name: Run unit tests
        run: dotnet test RiskScreening.UnitTests/RiskScreening.UnitTests.csproj -c Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/test-results.trx"
          retention-days: 3

      - name: Summary
        run: |
          echo "### CI Passed" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
